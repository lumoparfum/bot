<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚡ Vur Kaç Bot</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
      background:#0b0e11;color:#eaecef;padding:12px;min-height:100vh;
    }
    .container{max-width:600px;margin:0 auto;}
    .header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#131722;border-radius:12px;border:1px solid #2b3139;margin-bottom:12px;}
    .logo{font-size:22px;font-weight:700;color:#f3ba2f;}
    .status{display:flex;align-items:center;gap:6px;font-size:12px;color:#848e9c;}
    .dot{width:8px;height:8px;border-radius:50%;background:#0ecb81;display:inline-block;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .card{background:#131722;border:1px solid #2b3139;border-radius:12px;padding:14px 16px;margin-bottom:10px;}
    .card h3{font-size:12px;color:#848e9c;font-weight:400;margin-bottom:6px;}
    .value{font-size:24px;font-weight:700;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
    .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;min-height:56px;}
    .btn:active{transform:scale(.96);}
    .btn-green{background:#0ecb81;color:#0b0e11;}
    .btn-red{background:#f6465d;color:#fff;}
    .btn-gray{background:#2b3139;color:#eaecef;}
    .btn-yellow{background:#f3ba2f;color:#0b0e11;}
    .flex{display:flex;gap:8px;flex-wrap:wrap;}
    .flex .btn{flex:1;min-width:80px;}
    .log{background:#0b0e11;border:1px solid #2b3139;border-radius:8px;padding:8px 10px;height:120px;overflow-y:auto;font-family:'Courier New',monospace;font-size:11px;line-height:1.6;}
    .log .info{color:#848e9c;}
    .log .success{color:#0ecb81;}
    .log .warning{color:#f3ba2f;}
    .log .error{color:#f6465d;}
    .text-green{color:#0ecb81;}
    .text-red{color:#f6465d;}
    .text-yellow{color:#f3ba2f;}
    .text-muted{color:#848e9c;font-size:12px;}
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">⚡ Vur Kaç</div>
    <div class="status"><span class="dot"></span> <span id="durum-text">Beklemede</span></div>
  </div>

  <div class="grid">
    <div class="card"><h3>💰 Aktif</h3><div class="value text-green" id="aktif-bakiye">500.00</div></div>
    <div class="card"><h3>🔒 Yedek</h3><div class="value text-yellow" id="yedek-bakiye">0.00</div></div>
    <div class="card"><h3>📊 Pozisyon</h3><div class="value" id="poz-sayisi">0</div></div>
    <div class="card"><h3>📈 K/Z</h3><div class="value" id="toplam-kz">0.00</div></div>
  </div>

  <div class="flex">
    <button class="btn btn-green" id="baslatBtn">▶ Başlat</button>
    <button class="btn btn-red" id="durdurBtn">⏹ Durdur</button>
  </div>

  <div class="flex">
    <button class="btn btn-gray" id="raporBtn">📄 Rapor</button>
    <button class="btn btn-yellow" id="yenileBtn">🔄 Yenile</button>
  </div>

  <div class="card">
    <h3>📋 Son İşlemler</h3>
    <div style="max-height:150px;overflow-y:auto;font-size:11px;" id="islem-listesi">
      <div class="text-muted">Henüz işlem yok</div>
    </div>
  </div>

  <div class="card">
    <h3>📟 Canlı Log</h3>
    <div class="log" id="log-kutusu">
      <div class="info">[Sistem] Bot hazır. Başlat butonuna bas.</div>
    </div>
  </div>

</div>

<script>
  const API_URL = window.location.origin;
  let intervalId = null;

  function logYaz(msg, type='info'){
    const log = document.getElementById('log-kutusu');
    const saat = new Date().toLocaleTimeString('tr-TR');
    log.innerHTML += `<div class="${type}">[${saat}] ${msg}</div>`;
    log.scrollTop = log.scrollHeight;
  }

  async function durumGetir(){
    try{
      const res = await fetch(API_URL + '/status');
      const data = await res.json();
      document.getElementById('aktif-bakiye').textContent = data.aktifSermaye?.toFixed(2) || '0.00';
      document.getElementById('yedek-bakiye').textContent = data.yedekKasa?.toFixed(2) || '0.00';
      document.getElementById('poz-sayisi').textContent = data.pozisyonlar?.length || 0;
      document.getElementById('toplam-kz').textContent = data.toplamKZ?.toFixed(2) || '0.00';
      document.getElementById('durum-text').textContent = data.calisiyor ? 'Çalışıyor' : 'Durduruldu';
      document.getElementById('durum-text').style.color = data.calisiyor ? '#0ecb81' : '#f6465d';
      // Son işlemler
      const liste = document.getElementById('islem-listesi');
      if(data.sonIslemler && data.sonIslemler.length>0){
        liste.innerHTML = data.sonIslemler.slice(-5).reverse().map(i =>
          `<div>${i.coin} ${i.tip} | ${i.kar>=0?'+':''}${i.kar?.toFixed(2) || '0'}$ (${i.karYuzde?.toFixed(1)||0}%)</div>`
        ).join('');
      }
      return data;
    } catch(e){
      logYaz('⚠️ Sunucu bağlantı hatası', 'warning');
      return null;
    }
  }

  async function botBaslat(){
    try{
      const res = await fetch(API_URL + '/start', {method:'POST'});
      const data = await res.json();
      logYaz(data.mesaj || 'Bot başlatıldı.', 'success');
      durumGetir();
    } catch(e){ logYaz('❌ Başlatma hatası', 'error'); }
  }

  async function botDurdur(){
    try{
      const res = await fetch(API_URL + '/stop', {method:'POST'});
      const data = await res.json();
      logYaz(data.mesaj || 'Bot durduruldu.', 'warning');
      durumGetir();
    } catch(e){ logYaz('❌ Durdurma hatası', 'error'); }
  }

  async function raporIndir(){
    try{
      const res = await fetch(API_URL + '/rapor');
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'bot_rapor.txt';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      logYaz('📄 Rapor indirildi.', 'success');
    } catch(e){ logYaz('❌ Rapor hatası', 'error'); }
  }

  document.getElementById('baslatBtn').addEventListener('click', botBaslat);
  document.getElementById('durdurBtn').addEventListener('click', botDurdur);
  document.getElementById('raporBtn').addEventListener('click', raporIndir);
  document.getElementById('yenileBtn').addEventListener('click', durumGetir);

  // Her 10 saniyede durumu güncelle
  durumGetir();
  intervalId = setInterval(durumGetir, 10000);
</script>
</body>
</html>
